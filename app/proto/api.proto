syntax = "proto3";

package api;

option go_package = "goledger-challenge/pb";

service OracleService {
  // Writes a value to the smart contract (Besu)
  rpc Set(SetRequest) returns (SetResponse);
  
  // Reads the current value from the smart contract (Besu)
  rpc Get(GetRequest) returns (GetResponse);
  
  // Reads the value from the blockchain and saves (synchronizes) it to the database (PostgreSQL)
  rpc Sync(SyncRequest) returns (SyncResponse);
  
  // Checks if the value in the local database matches the value on the blockchain
  rpc Check(CheckRequest) returns (CheckResponse);
}

message SetRequest {
  string value = 1;
}

message SetResponse {
  bool success = 1;
  string tx_hash = 2;
}

message GetRequest {}

message GetResponse {
  string value = 1;
}

message SyncRequest {}

message SyncResponse {
  bool success = 1;
  string synced_value = 2;
}

message CheckRequest {}

message CheckResponse {
  bool in_sync = 1;
  string db_value = 2;
  string chain_value = 3;
}
